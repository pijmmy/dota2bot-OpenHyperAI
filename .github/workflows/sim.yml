name: Guineapig sim against this OHA checkout

# Whenever OHA Lua changes, pull the guineapig sim harness and run it
# against the PR's Lua code. Catches regressions in aba_teamplan.lua,
# aba_draft_strategy.lua, etc. before merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  run-sim:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout OHA (this PR's code)
        uses: actions/checkout@v4
        with:
          path: oha

      - name: Checkout guineapig sim harness
        uses: actions/checkout@v4
        with:
          repository: pijmmy/dota2-guineapig-extreme
          path: guineapig
          # Token needed because guineapig is private
          token: ${{ secrets.GUINEAPIG_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sim dependencies
        working-directory: guineapig
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run sim harness against this OHA checkout
        working-directory: guineapig
        run: python -m sim.run_sim --oha-root ../oha

      - name: Run sweep gate
        working-directory: guineapig
        run: |
          python -m sim.sweep \
            --oha-root ../oha \
            --seeds 3 \
            --fail-threshold 15
